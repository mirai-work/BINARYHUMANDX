<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>BINARY HUMAN DX</title>

    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

    <script>
    function showEndingMovie(name) {
        // すでに動画がある場合は削除
        const oldVideo = document.getElementById("endingMovie");
        if (oldVideo) {
            oldVideo.remove();
        }

        // ビデオ要素の作成
        const video = document.createElement("video");
        video.id = "endingMovie";
        video.src = name + ".mp4"; // Pythonで指定した "v1", "v2", "v3" + ".mp4"
        video.autoplay = true;
        video.controls = false;
        video.muted = false;
        video.playsInline = true;

        // 全画面表示のスタイル設定
        video.style.position = "fixed";
        video.style.left = "0";
        video.style.top = "0";
        video.style.width = "100vw";
        video.style.height = "100vh";
        video.style.objectFit = "contain";
        video.style.background = "black";
        video.style.zIndex = "9999";

        document.body.appendChild(video);

        console.log("movie start:", name);

        // 動画終了時の処理
        video.onended = function () {
            console.log("movie ended");
            video.remove();
            // ゲームインスタンスへ終了を通知
            if (window.game_instance) {
                window.game_instance.movie_finished();
            }
        };

        // 動画再生エラー時の処理
        video.onerror = function () {
            console.error("movie load error:", video.src);
            video.remove();
            // エラー時もゲームへ復帰させる
            if (window.game_instance) {
                window.game_instance.movie_finished();
            }
        };
    }
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }
    </style>
</head>

<body>
    <pyxel-run
        src="BinarryGITHUByou.py"
        gamepad="enabled">
    </pyxel-run>
</body>
</html>
